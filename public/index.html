<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#14b8a6" />

    <!-- PWA / Install -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NutriTrack" />

    <!-- SEO -->
    <meta name="description" content="Personal nutrition tracker for your Mounjaro weight loss journey" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>NutriTrack</title>

    <style>
      body { margin: 0; background: #0d1117; }
      #root { min-height: 100vh; }
      /* Safe area for iPhone notch/home bar */
      #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <noscript>Enable JavaScript to run NutriTrack.</noscript>
    <div id="root"></div>
  </body>
</html>
